<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stats Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <div class="card" data-color="#6366f1">
      <div class="card-header">
        <div class="icon-box" style="background: rgba(99,102,241,0.15);">
          <span class="icon">&#128200;</span>
        </div>
        <span class="trend up">&#9650; 12.5%</span>
      </div>
      <div class="stat-value" data-target="84320">0</div>
      <div class="stat-label">Total Revenue</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" data-width="72" style="background:#6366f1"></div>
      </div>
      <div class="card-footer">
        <span class="footer-text">vs last month</span>
        <span class="footer-value">$73,200</span>
      </div>
    </div>

    <div class="card" data-color="#f59e0b">
      <div class="card-header">
        <div class="icon-box" style="background: rgba(245,158,11,0.15);">
          <span class="icon">&#128101;</span>
        </div>
        <span class="trend up">&#9650; 8.1%</span>
      </div>
      <div class="stat-value" data-target="12480">0</div>
      <div class="stat-label">Active Users</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" data-width="58" style="background:#f59e0b"></div>
      </div>
      <div class="card-footer">
        <span class="footer-text">vs last month</span>
        <span class="footer-value">11,540</span>
      </div>
    </div>

    <div class="card" data-color="#10b981">
      <div class="card-header">
        <div class="icon-box" style="background: rgba(16,185,129,0.15);">
          <span class="icon">&#128722;</span>
        </div>
        <span class="trend down">&#9660; 3.2%</span>
      </div>
      <div class="stat-value" data-target="3241">0</div>
      <div class="stat-label">New Orders</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" data-width="45" style="background:#10b981"></div>
      </div>
      <div class="card-footer">
        <span class="footer-text">vs last month</span>
        <span class="footer-value">3,348</span>
      </div>
    </div>

    <div class="card" data-color="#ef4444">
      <div class="card-header">
        <div class="icon-box" style="background: rgba(239,68,68,0.15);">
          <span class="icon">&#128293;</span>
        </div>
        <span class="trend up">&#9650; 21.3%</span>
      </div>
      <div class="stat-value" data-target="98">0</div>
      <div class="stat-label">Conversion Rate %</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" data-width="88" style="background:#ef4444"></div>
      </div>
      <div class="card-footer">
        <span class="footer-text">vs last month</span>
        <span class="footer-value">80.8%</span>
      </div>
    </div>

  </div>
  <script src="index.js"></script>
</body>
</html>
